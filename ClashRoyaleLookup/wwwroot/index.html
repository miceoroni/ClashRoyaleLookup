<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Clash Royale Lookup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <h1 class="text-light text-center">Clash Royale Lookup</h1>

    <link rel="stylesheet" href="main.css">
    <div class="input-group mb-3">
        <input type="text" class="form-control" aria-label="User ID" aria-describedby="basic-addon1" id="tagInput" placeholder="#ABC123" />
        <button class="btn btn-primary" onclick="search()"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
            <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/>
        </svg>Search</button>
    </div>
        
    <div id="error" style="color:red"></div>
    <div id="results"></div>

    <script>
        async function search() {
            const tag = document.getElementById('tagInput').value.replace('#', '');
            const error = document.getElementById('error');
            const results = document.getElementById('results');

            error.textContent = '';
            results.innerHTML = '<span class="visually-hidden">Loading...</span>';
            results.setAttribute('class', 'spinner-border');

            try {
                const res = await fetch(`/api/player/${tag}`);
                const data = await res.json();

                if (!res.ok) {
                    error.textContent = data.message;
                    results.innerHTML = '';
                    return;
                }
                
                const clanIconRes = await fetch(`/api/player/badge/${data.clan.badgeId}`)
                const clanData = await clanIconRes.json();
                
                results.setAttribute('class', '');
                results.innerHTML = `
                    <h2><img src="${clanData.iconUrl}">${data.name}</h2>
                    <p>Level: ${data.expLevel}</p>
                    <p>Trophies: ${data.trophies} (Best: ${data.bestTrophies})</p>
                    <p>Wins: ${data.wins} | Losses: ${data.losses}</p>
                    <p>Battles: ${data.battleCount}</p>
                    <p>3-Crown Wins: ${data.threeCrownWins}</p>
                `;
            } catch {
                error.textContent = 'Something went wrong.';
                results.innerHTML = '';
            }
        }
		
        document.getElementById('tagInput')
            .addEventListener('keydown', e => e.key === 'Enter' && search());
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
