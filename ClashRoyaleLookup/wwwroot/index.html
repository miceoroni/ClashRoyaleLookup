<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Clash Royale Lookup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>

    <img src="./assets/aJWNVZ2grMBHPC5T3M4R.webp" alt="Clash Royale Logo" style="width: 500px; display: block; margin: 0 auto;"/>
    <h1 class="text-light text-center">Clash Royale Lookup</h1>

    <link rel="stylesheet" href="main.css">
    <div class="input-group mb-4 mx-auto w-25">
        <input type="text" class="form-control" aria-label="User ID" aria-describedby="basic-addon1" id="tagInput" placeholder="#ABC123" />
        <button class="btn btn-primary" onclick="search()"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-search" id="searchIcon" viewBox="0 0 16 16">
            <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/>
        </svg>Search</button>
    </div>
        
    <div id="error" class="text-center mb-4 mx-auto w-25" style="color:red"></div>
    <div id="results"></div>

    <script>
        async function search() {
            const tag = document.getElementById('tagInput').value.replace('#', '');
            const error = document.getElementById('error');
            const results = document.getElementById('results');

            error.textContent = '';
            results.innerHTML = '<span class="visually-hidden">Loading...</span>';
            results.setAttribute('class', 'spinner-border mx-auto');

            try {
                const res = await fetch(`/api/player/${tag}`);
                const data = await res.json();

                if (!res.ok) {
                    error.textContent = data.message;
                    results.innerHTML = '';
                    return;
                }
                
                const clanIconRes = await fetch(`/api/player/badge/${data.clan.badgeId}`)
                const clanData = await clanIconRes.json();
                
                results.setAttribute('class', 'w-25 mx-auto text-light');
                results.innerHTML = `
                    <div>
                        <h2 class="user-title"><img class="icon" src="${clanData.iconUrl}" alt="Icon of ${data.name}'s clan">${data.name}</h2>
                        <p class="clan-text">Apart of ${data.clan.name}</p>
                    </div>
                    <p class="stats"><img class="icon" src="./assets/XP.webp" alt="XP"/> Level: ${data.expLevel}</p>
                    <p class="stats"><img class="icon" src="./assets/Trophy.webp" alt="Trophy"/> Trophies: ${data.trophies} (Best: ${data.bestTrophies})</p>
                    <p class="stats"><img class="icon" src="./assets/clashcrown.png" alt="Crown"/> Wins: ${data.wins}</p>
                    <p class="stats"><img class="icon" src="./assets/clashcrown_red.png" alt="Red Crown"/> Losses: ${data.losses}</p>
                    <p class="stats"><img class="icon" src="./assets/battle.png" alt="Battle Icon"/> Battles: ${data.battleCount}</p>
                    <p class="stats"><img class="icon" src="./assets/threecrown.png" alt="Three Crowns"/> 3-Crown Wins: ${data.threeCrownWins}</p>
                    <div>
                        <div>
                            <p class="user-title">Current Favorite Card</p>
                        </div>
                        <div>
                            <div id="favorite-card-container">
                                <img src="${data.currentFavouriteCard.iconUrls.medium}" id="favorite-card-icon" alt="Favorite Card"/>
                                <p id="favorite-card-text">${data.currentFavouriteCard.name}<br><small>${data.currentFavouriteCard.rarity.toUpperCase()}</small></p>
                            </div>
                        </div>
                    </div>
                `;
            } catch {
                error.textContent = 'Something went wrong.';
                results.innerHTML = '';
            }
        }
		
        document.getElementById('tagInput')
            .addEventListener('keydown', e => e.key === 'Enter' && search());
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
